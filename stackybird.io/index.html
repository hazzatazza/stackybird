<!DOCTYPE html>
<html lang="en-us">

<head>
    <title>Stacky Bird - Game Only</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="assets/css/eurostile-extended.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.min.css?v=1.0.5">
    <link rel="stylesheet" href="assets/css/style.css?v=1.0.5">

    <script src="TemplateData/UnityProgress.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-analytics-compat.js"></script>
    
    <script src="Build/20986a4044eaa8551db6be07233cc1d9.js"></script>

    <script>
        // Instantiate WebGL Game
        var unityInstance = UnityLoader.instantiate("gameContainer", "Build/61df67ed8b648119f3a95eaa8e68b513.json", {
            onProgress: UnityProgress
        });

        function OnUnityReady() {
            if (unityInstance == null) return;
            unityInstance.SendMessage("LocalisationManager", "ChangeCurrentLanguage", "en");
        };
    </script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000; /* Keeps the background clean for the game */
            overflow: hidden;
        }
        #game-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #gameContainer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="game-wrapper">
        <div id="gameContainer"></div>
    </div>

    <script src="assets/js/lodash.custom.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</body>

</html>
